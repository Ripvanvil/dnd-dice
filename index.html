<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&D Dice Roller</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(18, 9, 31, 0.25), rgba(18, 9, 31, 0.55)),
        url("images/background.jpg") center / cover no-repeat,
        radial-gradient(circle at top, #3b1d5f, #12091f);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 750px;
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 35px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin-top: 0;
      font-size: 36px;
    }

    .subtitle {
      color: #d8c8ff;
      margin-bottom: 30px;
    }

    .dice-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      margin-bottom: 30px;
    }

    .dice-grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .dice-button {
      width: 100px;
      height: 100px;
      border: none;
      border-radius: 20px;
      padding: 10px;
      color: #fff;
      background: linear-gradient(145deg, #7b2ff7, #f107a3);
      cursor: pointer;
      transition: box-shadow 0.15s ease;
      box-shadow: 0 8px 20px rgba(241, 7, 163, 0.3);

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .dice-button:hover {
      box-shadow: 0 12px 28px rgba(241, 7, 163, 0.45);
    }

    .dice-button img {
      width: 55px;
      height: 55px;
      object-fit: contain;
      margin-bottom: 6px;
      pointer-events: none;
      user-select: none;
    }

    .dice-button span {
      font-size: 18px;
      font-weight: bold;
      pointer-events: none;
      user-select: none;
    }

    .dice-main {
      width: 170px;
      height: 170px;
      border-radius: 30px;
    }

    .dice-main img {
      width: 105px;
      height: 105px;
    }

    .dice-main span {
      font-size: 28px;
    }

    .result-box {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 18px;
      padding: 25px;
    }

    .result-label {
      color: #d8c8ff;
      margin-bottom: 10px;
    }

    .result {
      font-size: 64px;
      font-weight: bold;
      color: #ffd86b;
      min-height: 80px;
    }

    .special-message {
      margin-top: 10px;
      min-height: 28px;
      font-size: 22px;
      font-weight: bold;
      color: #ffd86b;
    }

    .history {
      margin-top: 25px;
      text-align: left;
    }

    .history h2 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .history-list {
      list-style: none;
      padding: 0;
      margin: 0;
      min-height: 160px;
      max-height: 160px;
      overflow-y: auto;
    }

    .history-list li {
      padding: 8px 12px;
      margin-bottom: 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
    }
  </style>
</head>

<body>
  <main class="app">
    <h1>Своих кубов то нет?</h1>
    <p class="subtitle">Давай кидай!</p>

    <div class="dice-area">
      <button class="dice-button dice-main" onclick="rollDice(20)">
        <img src="images/d20.png" alt="d20">
        <span>d20</span>
      </button>

      <div class="dice-grid">
        <button class="dice-button" onclick="rollDice(4)">
          <img src="images/d4.png" alt="d4">
          <span>d4</span>
        </button>

        <button class="dice-button" onclick="rollDice(6)">
          <img src="images/d6.png" alt="d6">
          <span>d6</span>
        </button>

        <button class="dice-button" onclick="rollDice(8)">
          <img src="images/d8.png" alt="d8">
          <span>d8</span>
        </button>

        <button class="dice-button" onclick="rollDice(10)">
          <img src="images/d10.png" alt="d10">
          <span>d10</span>
        </button>

        <button class="dice-button" onclick="rollDice(12)">
          <img src="images/d12.png" alt="d12">
          <span>d12</span>
        </button>
      </div>
    </div>

    <section class="result-box">
      <div class="result-label">Результат броска</div>
      <div class="result" id="result">—</div>
      <div class="special-message" id="specialMessage"></div>
    </section>

    <section class="history">
      <h2>История бросков</h2>
      <ul class="history-list" id="history"></ul>
    </section>
  </main>

  <script>
    function rollDice(sides) {
      const result = Math.floor(Math.random() * sides) + 1;

      const resultElement = document.getElementById("result");
      const historyElement = document.getElementById("history");
      const specialMessageElement = document.getElementById("specialMessage");

      resultElement.textContent = result;
      specialMessageElement.textContent = "";

      if (sides === 20 && result === 1) {
        specialMessageElement.textContent = "Критический провал!";
      }

      if (sides === 20 && result === 20) {
        specialMessageElement.textContent = "Критический успех!";
      }

      const historyItem = document.createElement("li");
      historyItem.textContent = `d${sides}: ${result}`;

      historyElement.prepend(historyItem);

      if (historyElement.children.length > 10) {
        historyElement.removeChild(historyElement.lastChild);
      }
    }
  </script>
</body>
</html>
